name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24.11
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare development build
        run: pnpm dev:prepare

      - name: Lint
        run: pnpm lint

      - name: Typecheck code
        run: pnpm typecheck

      - name: Test code
        run: pnpm test

      - name: Build packages
        run: pnpm build

      - name: Publish to pkg.pr.new
        run: pnpx pkg-pr-new publish --pnpm
