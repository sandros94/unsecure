<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>base64 fallback benchmark</title>
    <style>
      body {
        max-width: 780px;
        margin: 2rem auto;
        padding: 0 1rem;
        font-family: ui-sans-serif, system-ui, sans-serif;
      }
      h1 {
        font-size: 1.1rem;
      }
      #out {
        background: #111;
        color: #eee;
        padding: 1rem;
        border-radius: 6px;
        overflow-x: auto;
        white-space: pre;
      }
    </style>
  </head>
  <body>
    <h1>base64 encode fallback bench</h1>
    <p>
      Runs the same measurements as the CLI script, in this browser. Open DevTools → Console for any
      errors. Results render below; the page is unresponsive during the bench (~30s total on typical
      hardware).
    </p>
    <script type="module">
      // Cross-runtime benchmark for base64 encode fallback strategies.
      //
      // Usage:
      //   node test/base64-fallback.cross-runtime.mjs
      //   bun  test/base64-fallback.cross-runtime.mjs
      //   deno run test/base64-fallback.cross-runtime.mjs
      //
      // Browser:
      //   open test/base64-fallback.cross-runtime.html  (loads this script)
      //
      // Intentionally duplicates the fallback implementations locally — no `Buffer`,
      // no `Uint8Array.prototype.toBase64` — so every runtime measures the same
      // strategies regardless of which native fast paths it offers.

      // ---------- strategies ----------

      function encodeUnchunked(bytes) {
        // Current (pre-fix) library impl. Throws past V8's arg-count limit (~65535).
        return btoa(String.fromCodePoint(...bytes));
      }

      function encodeChunked(bytes) {
        const CHUNK = 0x8000;
        if (bytes.length <= CHUNK) {
          return btoa(String.fromCharCode(...bytes));
        }
        let binary = "";
        for (let i = 0; i < bytes.length; i += CHUNK) {
          binary += String.fromCharCode(...bytes.subarray(i, i + CHUNK));
        }
        return btoa(binary);
      }

      function encodeByteByByte(bytes) {
        let binary = "";
        for (let i = 0; i < bytes.length; i++) {
          binary += String.fromCharCode(bytes[i]);
        }
        return btoa(binary);
      }

      const B64 = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/";

      const HYBRID_THRESHOLD = 0x10000; // 64 KiB

      function encodeHybrid(bytes) {
        if (bytes.length <= HYBRID_THRESHOLD) {
          let binary = "";
          for (let i = 0; i < bytes.length; i++) {
            binary += String.fromCharCode(bytes[i]);
          }
          return btoa(binary);
        }
        return encodePureJs(bytes);
      }

      function encodePureJs(bytes) {
        const len = bytes.length;
        let result = "";
        let i = 0;
        for (; i + 2 < len; i += 3) {
          const b1 = bytes[i];
          const b2 = bytes[i + 1];
          const b3 = bytes[i + 2];
          result +=
            B64[b1 >> 2] +
            B64[((b1 & 0x03) << 4) | (b2 >> 4)] +
            B64[((b2 & 0x0f) << 2) | (b3 >> 6)] +
            B64[b3 & 0x3f];
        }
        if (i < len) {
          const b1 = bytes[i];
          if (i + 1 < len) {
            const b2 = bytes[i + 1];
            result +=
              B64[b1 >> 2] + B64[((b1 & 0x03) << 4) | (b2 >> 4)] + B64[(b2 & 0x0f) << 2] + "=";
          } else {
            result += B64[b1 >> 2] + B64[(b1 & 0x03) << 4] + "==";
          }
        }
        return result;
      }

      // ---------- harness ----------

      function makeBytes(size) {
        const bytes = new Uint8Array(size);
        for (let i = 0; i < size; i++) bytes[i] = i & 0xff;
        return bytes;
      }

      function bench(name, fn) {
        // Warmup: 50ms or 100 ops
        const warmupEnd = performance.now() + 50;
        let warmupOps = 0;
        while (performance.now() < warmupEnd && warmupOps < 100) {
          fn();
          warmupOps++;
        }

        // Measure: at least 500ms AND 30 ops, hard-capped at 5s
        const targetMs = 500;
        const minOps = 30;
        const maxMs = 5000;
        const start = performance.now();
        let ops = 0;
        let now = start;
        while ((now - start < targetMs || ops < minOps) && now - start < maxMs) {
          fn();
          ops++;
          now = performance.now();
        }
        const elapsed = now - start;
        return { name, opsPerSec: (ops / elapsed) * 1000, ops, elapsedMs: elapsed };
      }

      function detectRuntime() {
        if (typeof globalThis.Bun !== "undefined") {
          return `Bun ${globalThis.Bun.version}`;
        }
        if (typeof globalThis.Deno !== "undefined") {
          const d = globalThis.Deno;
          return `Deno ${d.version?.deno ?? "?"} (V8 ${d.version?.v8 ?? "?"})`;
        }
        if (typeof globalThis.process !== "undefined" && globalThis.process.versions?.node) {
          return `Node ${globalThis.process.versions.node} (V8 ${globalThis.process.versions.v8})`;
        }
        if (typeof navigator !== "undefined") {
          return `Browser — ${navigator.userAgent}`;
        }
        return "Unknown runtime";
      }

      function log(...args) {
        if (typeof document !== "undefined") {
          const line = args.join(" ");
          const pre =
            document.getElementById("out") ??
            (() => {
              const p = document.createElement("pre");
              p.id = "out";
              p.style.fontFamily = "ui-monospace, Menlo, Consolas, monospace";
              p.style.fontSize = "12px";
              document.body.appendChild(p);
              return p;
            })();
          pre.textContent += line + "\n";
        } else {
          console.log(...args);
        }
      }

      function fmtOps(n) {
        if (n >= 1000) return n.toLocaleString("en-US", { maximumFractionDigits: 0 });
        if (n >= 100) return n.toFixed(0);
        if (n >= 10) return n.toFixed(1);
        return n.toFixed(2);
      }

      function pad(s, w, right = false) {
        s = String(s);
        return s.length >= w ? s : right ? s.padStart(w) : s.padEnd(w);
      }

      // ---------- run ----------

      const UNCHUNKED_MAX = 32 << 10; // V8 arg-count safety ceiling

      const SIZES = [
        ["1 KiB", 1 << 10],
        ["4 KiB", 4 << 10],
        ["16 KiB", 16 << 10],
        ["32 KiB", 32 << 10],
        ["64 KiB", 64 << 10],
        ["256 KiB", 256 << 10],
        ["1 MiB", 1 << 20],
        ["4 MiB", 4 << 20],
      ];

      // Sanity check — fail fast if any strategy drifts from the reference.
      // Use both a small-path and a large-path sample to cover the hybrid's branches.
      for (const size of [1024, HYBRID_THRESHOLD + 1024]) {
        const sanity = makeBytes(size);
        const ref = encodeByteByByte(sanity);
        if (size <= 32768 && encodeUnchunked(sanity) !== ref) throw new Error("unchunked drift");
        if (encodeChunked(sanity) !== ref) throw new Error("chunked drift");
        if (encodePureJs(sanity) !== ref) throw new Error("pureJs drift");
        if (encodeHybrid(sanity) !== ref) throw new Error("hybrid drift");
      }

      log("=".repeat(74));
      log("base64 encode — fallback-only paths (no Buffer, no toBase64)");
      log("Runtime:", detectRuntime());
      log("=".repeat(74));

      const HEADER = pad("size", 10) + pad("strategy", 32) + pad("ops/s", 14, true) + "  " + "rel";
      log("");
      log(HEADER);
      log("-".repeat(74));

      for (const [label, size] of SIZES) {
        const input = makeBytes(size);
        const results = [];

        if (size <= UNCHUNKED_MAX) {
          results.push(bench("unchunked spread (old)", () => encodeUnchunked(input)));
        }
        results.push(bench("chunked spread", () => encodeChunked(input)));
        results.push(bench("byte-by-byte", () => encodeByteByByte(input)));
        results.push(bench("pure JS (no btoa)", () => encodePureJs(input)));
        results.push(bench("hybrid byte-by-byte + pure JS", () => encodeHybrid(input)));

        const fastest = Math.max(...results.map((r) => r.opsPerSec));
        for (const r of results) {
          const rel = (r.opsPerSec / fastest).toFixed(2) + "x";
          log(
            pad(label, 10) +
              pad(r.name, 32) +
              pad(fmtOps(r.opsPerSec), 14, true) +
              "  " +
              (r.opsPerSec === fastest ? "1.00x (fastest)" : rel),
          );
        }
        log("");
      }

      log("=".repeat(74));
      log("Rel is ops/s divided by the fastest strategy at that size.");
      log("Higher ops/s = faster. Sizes beyond 32 KiB skip 'unchunked' (throws on V8).");
    </script>
  </body>
</html>
